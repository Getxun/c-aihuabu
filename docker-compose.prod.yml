services:
  app:
    image: ghcr.io/getxun/c-aihuabu:latest
    container_name: infinite-canvas
    ports:
      - "127.0.0.1:3300:3000"
    environment:
      C_AI_PUBLIC_BASE_URL: "https://ai.k99.tw"
      AI_HUABU_DATA_DIR: "/app/web/data/account"
      # 参考图片上传后返回给视频上游的公网地址；上游通常要求 https://
    volumes:
      - ./data/account:/app/web/data/account
      - ./data/uploads:/app/web/data/uploads
    restart: unless-stopped
